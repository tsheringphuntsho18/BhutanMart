# Redis Sentinel Configuration
For High Availability and Automatic Failover

## Sentinel Nodes (3 recommended for production)
```
Sentinel 1: localhost:26379
Sentinel 2: localhost:26380
Sentinel 3: localhost:26381
```

## Master-Slave Replication
```
Master: localhost:6379
Slave 1: localhost:6380
Slave 2: localhost:6381
```

## Monitoring Configuration
- Master name: mymaster
- Quorum: 2 (minimum sentinels to agree on failover)
- Down after milliseconds: 30000 (30 seconds)
- Parallel sync: 1

## Failover Process
1. Sentinel detects master down
2. Quorum votes for failover
3. Promotes slave to master
4. Reconfigures other slaves
5. Updates client configuration

## Configuration File (sentinel.conf)
```
port 26379
sentinel monitor mymaster 127.0.0.1 6379 2
sentinel down-after-milliseconds mymaster 30000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 180000
```

## Persistence Settings
For production Redis instances:
- Save: 900 1 300 10 60 10000 (RDB snapshots)
- AOF (Append Only File): yes
- AOF fsync: everysec

## Development Setup
- Persistence disabled for speed
- Single instance (no replication)
- No sentinel needed
