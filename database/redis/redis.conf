# Redis Configuration for BhutanMart
This file documents Redis configuration and usage patterns

## Connection Configuration
- Host: localhost
- Port: 6379
- Database: 0 (default)
- Password: (none in development)

## Redis Data Structures Usage

### 1. Shopping Cart (Hash)
```
Key: cart:{userId}
Structure: { productId: quantity, productId: quantity, ... }
TTL: 7 days (604800 seconds)
```

### 2. User Sessions (String)
```
Key: session:{userId}
Value: JSON serialized session data
TTL: 7 days (604800 seconds)
```

### 3. Product Cache (String)
```
Key: product:{productId}
Value: JSON serialized product details
TTL: 1 hour (3600 seconds)
```

### 4. Trending Products (Sorted Set)
```
Key: trending:products
Score: View count
Members: productId
TTL: 5 minutes (300 seconds)
```

### 5. Recently Viewed (Sorted Set)
```
Key: recently_viewed:{userId}
Score: Timestamp
Members: productId
Max members: 20
```

### 6. Page Views Tracking (HyperLogLog)
```
Key: pageviews:{productId}:{date}
Value: Unique view count estimation
TTL: 30 days
```

### 7. Rate Limiter (String)
```
Key: ratelimit:{userId}:{endpoint}
Value: Request count
TTL: 1 minute (60 seconds)
```

### 8. Leaderboard (Sorted Set)
```
Key: seller:leaderboard
Score: Average rating
Members: sellerId
```

## Redis Commands Reference

### Common Operations
- `SET key value EX 3600` - Set with expiration
- `GET key` - Retrieve value
- `DEL key` - Delete key
- `HSET key field value` - Hash set
- `HGET key field` - Hash get
- `ZADD key score member` - Sorted set add
- `ZRANGE key 0 -1` - Get sorted set members

### Monitoring
- `redis-cli` - Connect to Redis
- `MONITOR` - Watch all commands in real-time
- `INFO` - Server statistics
- `DBSIZE` - Number of keys in database
- `FLUSHDB` - Clear current database

## Performance Optimization
- Max memory policy: allkeys-lru (evict least recently used)
- Maxmemory: 256MB (development), 4GB (production)
- AOF (Append Only File): Disabled in development
- RDB (Snapshots): Enabled for persistence

## Cache Invalidation Strategy
1. Time-based: Set TTL on all cached data
2. Event-based: Invalidate on data changes (product updates)
3. Manual: Clear cache via admin dashboard
